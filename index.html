<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sort 可視化登入</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-sky-100 via-white to-indigo-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white/90 backdrop-blur rounded-2xl shadow-xl overflow-hidden">

    <!-- Header -->
    <div class="bg-gradient-to-r from-sky-500 to-indigo-600 text-white p-6 text-center">
      <h1 class="text-2xl font-bold">Sort 可視化</h1>
      <p class="text-sm text-sky-100 mt-1">登入後開始體驗演算法視覺化</p>
    </div>

    <!-- Form -->
    <div class="p-6">
      <form id="loginForm" class="space-y-4">

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">帳號</label>
          <input
            id="email"
            type="email"
            placeholder="example@email.com"
            class="w-full rounded-xl border border-slate-300 px-3 py-2 outline-none focus:ring-2 focus:ring-sky-400"
          />
          <p id="emailError" class="text-red-500 text-xs mt-1 hidden">請輸入正確的電子郵件</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">密碼</label>
          <div class="relative">
            <input
              id="password"
              type="password"
              placeholder="請輸入密碼"
              class="w-full rounded-xl border border-slate-300 px-3 py-2 pr-14 outline-none focus:ring-2 focus:ring-sky-400"
            />
            <button
              type="button"
              id="togglePassword"
              class="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-sky-600"
            >顯示</button>
          </div>
          <p id="passwordError" class="text-red-500 text-xs mt-1 hidden">至少 6 個字</p>
        </div>

        <button
          type="submit"
          class="w-full rounded-xl bg-slate-900 text-white py-2.5 text-sm font-semibold hover:bg-slate-800"
        >登入</button>

        <p class="text-center text-xs text-slate-500">
          還沒有帳號？
          <a href="#" class="text-sky-600">註冊</a>
        </p>
      </form>

      <div
        id="successMessage"
        class="mt-4 hidden rounded-xl bg-emerald-50 text-emerald-700 text-sm px-3 py-2"
      >
        登入成功！準備進入 Sort 可視化
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const togglePassword = document.getElementById('togglePassword');
    const successMessage = document.getElementById('successMessage');

    togglePassword.addEventListener('click', () => {
      const isPassword = password.type === 'password';
      password.type = isPassword ? 'text' : 'password';
      togglePassword.textContent = isPassword ? '隱藏' : '顯示';
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const emailValue = email.value.trim();
      const passwordValue = password.value.trim();
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      let isValid = true;

      if (!emailPattern.test(emailValue)) {
        emailError.classList.remove('hidden');
        isValid = false;
      } else {
        emailError.classList.add('hidden');
      }

      if (passwordValue.length < 6) {
        passwordError.classList.remove('hidden');
        isValid = false;
      } else {
        passwordError.classList.add('hidden');
      }

      if (isValid) {
        successMessage.classList.remove('hidden');
        form.reset();
        password.type = 'password';
        togglePassword.textContent = '顯示';
        window.location.href = 'homepage.html';
      } else {
        successMessage.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
