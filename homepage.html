<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>排序法視覺化</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <div class="mx-auto max-w-7xl px-6 py-10 lg:px-10">
    <header class="mb-8">
      <p class="text-sm font-semibold uppercase tracking-[0.25em] text-sky-600">Sort Visualizer</p>
      <h1 class="mt-2 text-3xl font-black sm:text-4xl">排序演算法視覺展示</h1>
      <p class="mt-3 max-w-3xl text-sm leading-6 text-slate-600">
        選擇想看的排序法後，會跳出操作視窗來顯示輸入、速度控制與排序過程，方便之後繼續新增更多演算法。
      </p>
    </header>

    <section class="grid gap-5 md:grid-cols-3">
      <button class="algo-card group rounded-[2rem] border-2 border-slate-900 bg-white px-6 py-7 text-left shadow-sm transition hover:-translate-y-1 hover:shadow-lg" data-algo="bubble">
        <div class="mb-5 flex items-center justify-between">
          <span class="rounded-full bg-slate-900 px-3 py-1 text-xs font-bold text-white">Sort 01</span>
          <span class="text-sm font-semibold text-sky-600">基礎排序法</span>
        </div>
        <h2 class="text-2xl font-black">Bubble Sort</h2>
        <p class="mt-3 text-sm leading-6 text-slate-600">反覆比較相鄰元素，若順序錯誤就交換，較大的值會一步一步往右移動。</p>
        <div class="mt-5 flex flex-wrap gap-2 text-xs font-semibold">
          <span class="rounded-full bg-slate-100 px-3 py-1.5">相鄰比較</span>
          <span class="rounded-full bg-slate-100 px-3 py-1.5">容易理解</span>
          <span class="rounded-full bg-slate-100 px-3 py-1.5">交換頻繁</span>
          <span class="rounded-full bg-slate-100 px-3 py-1.5">教學常見</span>
          <span class="rounded-full bg-slate-100 px-3 py-1.5">動畫明顯</span>
        </div>
      </button>

      <button class="algo-card group rounded-[2rem] border-2 border-slate-300 bg-white px-6 py-7 text-left shadow-sm transition hover:-translate-y-1 hover:border-slate-900 hover:shadow-lg" data-algo="selection">
        <div class="mb-5 flex items-center justify-between">
          <span class="rounded-full bg-slate-900 px-3 py-1 text-xs font-bold text-white">Sort 02</span>
          <span class="text-sm font-semibold text-sky-600">基礎排序法</span>
        </div>
        <h2 class="text-2xl font-black">Selection Sort</h2>
        <p class="mt-3 text-sm leading-6 text-slate-600">每輪挑出目前最小值，放到最前面，能清楚看出未排序區和已排序區的差異。</p>
        <div class="mt-5 flex flex-wrap gap-2 text-xs font-semibold">
          <span class="rounded-full bg-slate-100 px-3 py-1.5">尋找最小值</span>
          <span class="rounded-full bg-slate-100 px-3 py-1.5">交換次數少</span>
          <span class="rounded-full bg-slate-100 px-3 py-1.5">區塊清楚</span>
          <span class="rounded-full bg-slate-100 px-3 py-1.5">教學常見</span>
          <span class="rounded-full bg-slate-100 px-3 py-1.5">步驟直觀</span>
        </div>
      </button>

      <button class="algo-card group rounded-[2rem] border-2 border-slate-300 bg-white px-6 py-7 text-left shadow-sm transition hover:-translate-y-1 hover:border-slate-900 hover:shadow-lg" data-algo="insertion">
        <div class="mb-5 flex items-center justify-between">
          <span class="rounded-full bg-slate-900 px-3 py-1 text-xs font-bold text-white">Sort 03</span>
          <span class="text-sm font-semibold text-sky-600">基礎排序法</span>
        </div>
        <h2 class="text-2xl font-black">Insertion Sort</h2>
        <p class="mt-3 text-sm leading-6 text-slate-600">像整理手牌一樣，逐一把元素插入已排序的區間，對近乎排序好的資料很有效。</p>
        <div class="mt-5 flex flex-wrap gap-2 text-xs font-semibold">
          <span class="rounded-full bg-slate-100 px-3 py-1.5">逐步插入</span>
          <span class="rounded-full bg-slate-100 px-3 py-1.5">實作簡單</span>
          <span class="rounded-full bg-slate-100 px-3 py-1.5">位移明顯</span>
          <span class="rounded-full bg-slate-100 px-3 py-1.5">小資料適合</span>
          <span class="rounded-full bg-slate-100 px-3 py-1.5">動畫清楚</span>
        </div>
      </button>
    </section>
  </div>

  <div id="sortModal" class="fixed inset-0 z-50 hidden">
    <div id="modalOverlay" class="absolute inset-0 bg-slate-950/70 backdrop-blur-sm"></div>

    <div class="relative h-screen overflow-y-auto p-4">
      <section class="relative z-10 mx-auto my-6 w-full max-w-6xl rounded-[2rem] border border-slate-200 bg-white p-6 shadow-2xl">
        <div class="flex items-start justify-between gap-4">
          <div class="max-w-3xl">
            <p class="text-sm font-semibold uppercase tracking-[0.2em] text-sky-600">Now Selected</p>
            <h3 id="algorithmName" class="mt-2 text-2xl font-black">Bubble Sort</h3>
            <p id="algorithmDescription" class="mt-2 text-sm leading-6 text-slate-600">
              反覆比較相鄰的兩個數字，若順序錯誤就交換，較大的值會一步步浮到右側。
            </p>
          </div>

          <div class="flex items-start gap-3">
            <div class="rounded-2xl bg-slate-100 px-4 py-3">
              <p class="text-xs uppercase tracking-[0.2em] text-slate-500">Status</p>
              <p id="statusText" class="mt-1 text-sm font-semibold text-slate-800">準備開始</p>
            </div>
            <button id="closeModalBtn" class="rounded-2xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">關閉</button>
          </div>
        </div>

        <div class="mt-6 rounded-[2rem] border border-slate-200 bg-slate-50 p-5">
          <div class="flex items-center justify-between gap-3">
            <div>
              <p class="text-sm font-semibold uppercase tracking-[0.2em] text-sky-600">Core Code</p>
              <h4 class="mt-2 text-lg font-black text-slate-900">核心程式碼</h4>
            </div>
            <span id="codeTitle" class="rounded-full bg-white px-3 py-1 text-xs font-semibold text-slate-600">Bubble Sort</span>
          </div>

          <pre class="mt-4 overflow-x-auto rounded-[1.5rem] bg-slate-950 p-4 text-sm leading-6 text-slate-100"><code id="algorithmCode"></code></pre>
        </div>

        <div class="mt-6 grid gap-4 lg:grid-cols-[1.4fr_0.6fr]">
          <div>
            <label for="arrayInput" class="mb-2 block text-sm font-semibold text-slate-700">輸入要排序的數字</label>
            <input
              id="arrayInput"
              type="text"
              value="42, 17, 63, 9, 28, 55, 31, 12"
              placeholder="例如：8, 3, 5, 1, 9"
              class="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-100"
            />
            <p class="mt-2 text-xs text-slate-500">請輸入 2 到 24 個整數，並用逗號分隔。</p>
            <p id="inputError" class="mt-2 hidden text-sm font-medium text-rose-600"></p>
          </div>

          <div>
            <label for="speedRange" class="mb-2 block text-sm font-semibold text-slate-700">動畫速度</label>
            <div class="rounded-2xl border border-slate-300 px-4 py-4">
              <input id="speedRange" type="range" min="40" max="500" step="10" value="220" class="w-full accent-sky-600" />
              <div class="mt-3 flex items-center justify-between text-xs font-semibold text-slate-500">
                <span>較快</span>
                <span id="speedLabel" class="text-slate-700">220 ms</span>
                <span>較慢</span>
              </div>
            </div>
          </div>
        </div>

        <div class="mt-6 flex flex-wrap gap-3">
          <button id="shuffleBtn" class="rounded-2xl bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white hover:bg-slate-800">隨機產生資料</button>
          <button id="applyInputBtn" class="rounded-2xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50">套用輸入</button>
          <button id="startBtn" class="rounded-2xl bg-sky-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-sky-700">開始排序</button>
          <button id="pauseBtn" class="rounded-2xl bg-slate-200 px-4 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-300">暫停</button>
        </div>

        <div class="mt-6 flex flex-wrap gap-3 text-xs font-semibold text-slate-600">
          <div class="flex items-center gap-2 rounded-full bg-slate-100 px-3 py-1.5"><span class="h-3 w-3 rounded-full bg-sky-400"></span>一般狀態</div>
          <div class="flex items-center gap-2 rounded-full bg-slate-100 px-3 py-1.5"><span class="h-3 w-3 rounded-full bg-amber-400"></span>正在比較</div>
          <div class="flex items-center gap-2 rounded-full bg-slate-100 px-3 py-1.5"><span class="h-3 w-3 rounded-full bg-rose-500"></span>正在交換</div>
          <div class="flex items-center gap-2 rounded-full bg-slate-100 px-3 py-1.5"><span class="h-3 w-3 rounded-full bg-emerald-400"></span>已完成排序</div>
        </div>

        <div class="mt-6 rounded-[2rem] bg-slate-950 px-4 py-5">
          <div id="barContainer" class="flex h-80 items-end gap-2 overflow-hidden"></div>
        </div>
      </section>
    </div>
  </div>

  <script src="./homepage.js"></script>
</body>
</html>
